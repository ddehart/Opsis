name: Opsis
options:
  bundleIdPrefix: com.derekashmore
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.2"

packages:
  swift-cmark-gfm:
    url: https://github.com/stackotter/swift-cmark-gfm
    from: "1.0.2"

targets:
  Opsis:
    type: application
    platform: macOS
    supportedDestinations: [macOS]
    sources:
      - Opsis
    dependencies:
      - package: swift-cmark-gfm
        product: CMarkGFM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.derekashmore.Opsis
        PRODUCT_NAME: Opsis
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.2"
        INFOPLIST_FILE: Opsis/Info.plist
        CODE_SIGN_ENTITLEMENTS: Opsis/Opsis.entitlements
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: false

  OpsisTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - OpsisTests
    dependencies:
      - target: Opsis
    settings:
      base:
        SWIFT_VERSION: "6.2"
        GENERATE_INFOPLIST_FILE: true
